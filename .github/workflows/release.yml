name: Release

# Push a version tag (e.g. v0.1.0) → build the native app, sign with the Developer
# ID, notarize + staple, package a dmg, and attach it to a GitHub Release. The
# libghostty framework is pulled from the ghostty-fw release (built by ghostty.yml),
# since it's too big to commit.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create/update the GitHub Release + read the ghostty-fw asset

jobs:
  release-mac:
    runs-on: macos-14 # arm64; universal ghostty means the app runs on Intel too
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      # The native build needs the prebuilt libghostty xcframework at ghostty-fw/.
      - name: Fetch libghostty framework
        run: |
          gh release download ghostty-fw --pattern 'GhosttyKit.xcframework.tar.gz' --output ghostty.tgz
          mkdir -p ghostty-fw
          tar -C ghostty-fw -xzf ghostty.tgz
          test -d ghostty-fw/GhosttyKit.xcframework

      - name: Version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Import the "Developer ID Application" cert into a temporary keychain.
      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          ID=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.*)".*/\1/')
          echo "SIGN_ID=$ID" >> "$GITHUB_ENV"
          echo "Using signing identity: $ID"

      - name: Build · sign the app
        run: |
          RIVEN_VERSION="${{ steps.ver.outputs.version }}" \
          RIVEN_SIGN_ID="$SIGN_ID" \
          ./build-app.sh

      # Notarize the app itself (submit a zip), then staple the ticket into it so it
      # passes Gatekeeper offline even when dragged out of the dmg.
      - name: Notarize & staple the app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent riven.app riven.zip
          xcrun notarytool submit riven.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
          xcrun stapler staple riven.app

      - name: Package DMG
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          STAGE="$RUNNER_TEMP/dmg"
          mkdir -p "$STAGE"
          cp -R riven.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "riven" -srcfolder "$STAGE" -ov -format UDZO "riven-$VERSION.dmg"

      - name: Notarize & staple the DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG="riven-${{ steps.ver.outputs.version }}.dmg"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            riven-*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
