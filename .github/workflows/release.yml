name: Release

# Push a version tag (e.g. v0.1.0) → build the native app, sign with the Developer
# ID, notarize + staple, package a dmg, and attach it to a GitHub Release. The
# libghostty framework is pulled from the ghostty-fw release (built by ghostty.yml),
# since it's too big to commit.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create/update the GitHub Release + read the ghostty-fw asset

jobs:
  release-mac:
    runs-on: macos-15 # arm64; universal ghostty means the app runs on Intel too
    env:
      GH_TOKEN: ${{ github.token }}
      # Gate the Sparkle appcast steps on the signing key being configured.
      HAS_SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      # Package.swift requires Swift 6 (Xcode 16+); the default runner Xcode may be older.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # The native build needs the prebuilt libghostty xcframework at ghostty-fw/.
      - name: Fetch libghostty framework
        run: |
          gh release download ghostty-fw --pattern 'GhosttyKit.xcframework.tar.gz' --output ghostty.tgz
          mkdir -p ghostty-fw
          tar -C ghostty-fw -xzf ghostty.tgz
          test -d ghostty-fw/GhosttyKit.xcframework

      - name: Version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Install the TypeScript language server (+ typescript) so build-app.sh can bundle
      # it into the app (LSP works with no per-user install). node is preinstalled on the
      # macOS runner; node_modules is gitignored, so this must run before the build.
      - name: Install bundled tools
        run: npm install --omit=dev --no-audit --no-fund

      # Import the "Developer ID Application" cert into a temporary keychain.
      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          ID=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.*)".*/\1/')
          echo "SIGN_ID=$ID" >> "$GITHUB_ENV"
          echo "Using signing identity: $ID"

      - name: Build · sign the app
        env:
          # Public Supabase client values (anon key is RLS-protected). Baked into
          # Info.plist so released builds have working account sync; absent → the
          # account tab shows "not configured".
          RIVEN_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          RIVEN_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          RIVEN_SUPABASE_REDIRECT: ${{ secrets.VITE_SUPABASE_REDIRECT }}
        run: |
          RIVEN_VERSION="${{ steps.ver.outputs.version }}" \
          RIVEN_SIGN_ID="$SIGN_ID" \
          ./build-app.sh

      # Notarize the app itself (submit a zip), then staple the ticket into it so it
      # passes Gatekeeper offline even when dragged out of the dmg.
      - name: Notarize & staple the app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent riven.app riven.zip
          xcrun notarytool submit riven.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
          xcrun stapler staple riven.app

      - name: Package DMG
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="riven-$VERSION.dmg"
          # create-dmg lays out the window with the app on the left and an Applications
          # drop-link on the right, so the drag-to-install is obvious. Fall back to a
          # plain hdiutil dmg (still has the Applications symlink) if it flakes headless.
          brew install create-dmg || true
          if command -v create-dmg >/dev/null; then
            create-dmg \
              --volname "riven" \
              --window-size 540 380 --icon-size 100 \
              --icon "riven.app" 140 190 \
              --app-drop-link 400 190 \
              --hide-extension "riven.app" \
              "$DMG" "riven.app" || true
          fi
          if [ ! -f "$DMG" ]; then
            STAGE="$RUNNER_TEMP/dmg"; mkdir -p "$STAGE"
            cp -R riven.app "$STAGE/"; ln -s /Applications "$STAGE/Applications"
            hdiutil create -volname "riven" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          fi

      - name: Notarize & staple the DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG="riven-${{ steps.ver.outputs.version }}.dmg"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            riven-*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true

      # ---- Sparkle auto-update: sign the dmg + refresh the appcast feed ----
      - name: Sign update + generate appcast
        if: ${{ env.HAS_SPARKLE_KEY == 'true' }}
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="riven-$VERSION.dmg"
          SIGN=$(find .build -name sign_update -path '*bin*' | head -1)
          printf '%s' "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_ed
          SIG=$("$SIGN" "$DMG" --ed-key-file /tmp/sparkle_ed)   # → sparkle:edSignature="…" length="…"
          rm -f /tmp/sparkle_ed
          URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION/$DMG"
          cat > appcast.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>riven</title>
              <item>
                <title>$VERSION</title>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure url="$URL" $SIG type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          XML
          cat appcast.xml

      - name: Publish appcast feed
        if: ${{ env.HAS_SPARKLE_KEY == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: appcast
          name: Sparkle appcast
          prerelease: true
          files: appcast.xml
