<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root { --bg: #101113; --accent: #ff7847; --accent-2: #a18fff; }  /* set live by native from the theme */
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--bg); }
  /* Editor GROUPS (VS Code-style split): a flex row of groups, each a column with its
     own HTML tab strip + a Monaco container. */
  #egroups { display: flex; height: 100%; width: 100%; }
  /* nested split containers (row = side-by-side, col = stacked top/bottom) */
  .esplit { display: flex; flex: 1 1 0; min-width: 0; min-height: 0; }
  .esplit.row { flex-direction: row; }
  .esplit.col { flex-direction: column; }
  .esplit > * { flex: 1 1 0; min-width: 0; min-height: 0; }
  /* the only seam between panes — a hair of the synced theme tone, no bright line */
  .esplit.row > * + * { border-left: 1px solid var(--seam, rgba(127,127,127,0.22)); }
  .esplit.col > * + * { border-top: 1px solid var(--seam, rgba(127,127,127,0.22)); }
  .egroup { flex: 1 1 0; min-width: 0; min-height: 0; display: flex; flex-direction: column; position: relative; }
  .etabs { height: 30px; min-height: 30px; display: flex; align-items: stretch; overflow-x: auto; overflow-y: hidden;
    background: var(--bg); }
  .etabs::-webkit-scrollbar { height: 0; }
  .etab { display: flex; align-items: center; gap: 6px; padding: 0 8px 0 12px; max-width: 200px; cursor: pointer;
    font: 12px -apple-system; color: rgba(227,229,234,0.55); white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.05); }
  .etab { background: rgba(0,0,0,0.22); }                 /* inactive tab: a touch darker than the editor */
  .etab.active { color: #e3e5ea; background: var(--bg); box-shadow: inset 0 -2px 0 var(--accent); }
  .egroup.focused .etab.active { box-shadow: inset 0 -2px 0 var(--accent); }
  .etab[draggable] { -webkit-user-drag: element; }
  /* per-group drop overlay (only live while a tab is being dragged) + drop indicator */
  .edrop { position: absolute; left: 0; right: 0; top: 30px; bottom: 0; z-index: 20; display: none; }
  #dropind { position: fixed; z-index: 50; pointer-events: none; display: none; box-sizing: border-box;
    background: color-mix(in srgb, var(--accent) 16%, transparent);
    border: 1.5px solid color-mix(in srgb, var(--accent) 75%, transparent); }
  .etab .name { overflow: hidden; text-overflow: ellipsis; }
  .etab .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-2); display: none; }
  .etab.dirty .dot { display: block; }
  .etab .x { width: 15px; height: 15px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center;
    color: rgba(227,229,234,0.55); font-size: 13px; }
  .etab .x:hover { background: rgba(255,255,255,0.12); color: #ff6b63; }
  .etab.dirty .x { display: none; }
  .etab.dirty:hover .x { display: inline-flex; }
  .etab.dirty:hover .dot { display: none; }
  .emonaco { flex: 1 1 0; min-height: 0; position: relative; }
  /* Unify Monaco with the NATIVE chrome: force the editor background + gutter to the
     app canvas token (--bg, set by native from the theme) so the editor area, the tab
     strips, and the native dock chrome are all ONE color — no seam/band between them.
     Syntax token colors still come from Shiki. Mirrors riven's styles.css. */
  .monaco-editor,
  .monaco-editor .monaco-editor-background,
  .monaco-editor .margin,
  .monaco-editor-background { background-color: var(--bg) !important; }
  #empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #6a6a6a; font: 13px -apple-system; pointer-events: none; }
  /* Peek / references widget: the file-match LIST uses a fixed workbench font, not the
     editor fontSize, so it ignored our font-size setting. Bind it to --riven-font-size.
     (The embedded preview editor honors fontSize itself — don't force CSS on it.) */
  .monaco-editor .reference-zone-widget .ref-tree,
  .monaco-editor .reference-zone-widget .ref-tree .monaco-list-row,
  .monaco-editor .reference-zone-widget .ref-tree .reference-file,
  .monaco-editor .reference-zone-widget .ref-tree .reference,
  .monaco-editor .reference-zone-widget .ref-tree .referenceMatch { font-size: var(--riven-font-size, 12px) !important; }
  .monaco-editor .peekview-widget .head .peekview-title .filename,
  .monaco-editor .peekview-widget .head .peekview-title .dirname,
  .monaco-editor .peekview-widget .head .peekview-title .meta { font-size: var(--riven-font-size, 12px) !important; }
  /* Unify Monaco's canvas + gutter with the app background (riven does this);
     syntax token colors still come from Shiki. */
  .monaco-editor, .monaco-editor .monaco-editor-background,
  .monaco-editor .margin, .monaco-editor .margin-view-overlays,
  .monaco-editor-background { background-color: var(--bg) !important; }
  /* NOTE: don't override .minimap background — it hides the minimap's code overview. */
  /* agent diff review (matches riven) */
  .agent-add-line { background: rgba(76, 195, 138, 0.13); }
  .agent-add-gutter { background: #4cc38a; width: 3px !important; margin-left: 3px; }
  .agent-revert-glyph { cursor: pointer; }
  .agent-revert-glyph::before { content: '↺'; color: #e2b053; font-size: 12px; display: block; text-align: center; }
  .agent-del-zone { background: rgba(229, 83, 75, 0.14); font-family: Menlo, monospace; font-size: 13px; }
  .agent-del-row { color: #e5836b; white-space: pre; padding-left: 26px; line-height: 19px; }
  #hunknav { position: absolute; top: 8px; right: 18px; z-index: 20; display: none; align-items: center; gap: 10px;
    background: rgba(255,120,71,0.14); border: 1px solid rgba(255,120,71,0.5); border-radius: 8px; padding: 6px 14px;
    font: 12px -apple-system; color: #ffd9c8; box-shadow: 0 6px 16px rgba(0,0,0,0.45); backdrop-filter: blur(8px); }
  #hunklabel { font-weight: 600; letter-spacing: 0.01em; }
  #hunknav button { background: none; border: none; color: #ffd9c8; cursor: pointer; font-size: 15px; padding: 0 4px; line-height: 1; }
  #hunknav button:hover { color: #fff; }
  /* GitLens-style inline blame (dimmed, on the cursor line) */
  .git-blame-inline { color: #6a6a72; font-style: italic; opacity: 0.7; }
  /* riven scrollbars: 10px, floating thumb via 3px transparent padding-box border */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px;
    border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); background-clip: padding-box; }
  ::-webkit-scrollbar-corner { background: transparent; }
</style>
</head>
<body>
<div id="egroups"></div>
<div id="dropind"></div>
<div id="empty">파일을 선택하세요</div>
<div id="hunknav">
  <span id="hunklabel">변경 1/1</span>
  <button onclick="gotoHunk(-1)" title="이전 변경">‹</button>
  <button onclick="gotoHunk(1)" title="다음 변경">›</button>
  <button onclick="acceptCurrentHunk()" title="수락" style="color:#4cc38a">✓</button>
  <button onclick="revertCurrentHunk()" title="되돌리기" style="color:#e2b053">↺</button>
</div>
<script src="monaco/vs/loader.js"></script>
<script src="shiki.js"></script>
<script>
// Monaco is bundled locally (monaco/vs). Syntax colors come from Shiki (the same
// TextMate grammars + themes VS Code uses), bundled locally in shiki.js (wasm
// inlined — no CDN). window.rivenInitShiki(monaco) takes over Monaco's registry.
let editor = null;
let shikiReady = false;
const models = {};        // path -> monaco model
const savedVersion = {};  // path -> alternativeVersionId at last save
const lastDirty = {};     // path -> last known dirty state (skip redundant DOM/native work)
let currentPath = null;
let currentTheme = 'dark-plus';          // VSCode Dark+ (set live by native)
let pendingGhost = null;                 // { line, text } for AI ghost completion
const agentDecos = {};                   // path -> decoration ids
const blameData = {};                    // path -> { line: "author, time · summary" }
let blameDeco = null;
const post = (msg) => window.webkit.messageHandlers.riven.postMessage(msg);
// Perf instrumentation → native debug log (owner-only). Logs only when something is
// slow, so it's free in the common case but pinpoints jank if it recurs.
const wlog = (m) => { try { window.webkit.messageHandlers.log.postMessage(m); } catch (e) {} };
function timed(label, fn) {
  const t0 = performance.now(); const r = fn(); const dt = performance.now() - t0;
  if (dt > 60) wlog('SLOW ' + label + ' ' + Math.round(dt) + 'ms'); return r;
}
// Frame-gap jank detector. WebKit doesn't implement the `longtask` PerformanceObserver,
// so we watch the rAF cadence instead: a gap far above one frame means the main thread
// (or the compositor) stalled. Logged so a recurring hitch is quantified.
let _lastFrame = performance.now(), _jankCount = 0;
function _frameWatch() {
  const now = performance.now(), gap = now - _lastFrame; _lastFrame = now;
  if (gap > 120) { _jankCount++; wlog('JANK ' + Math.round(gap) + 'ms gap (#' + _jankCount + ')'); }
  requestAnimationFrame(_frameWatch);
}
requestAnimationFrame(_frameWatch);
// Run fn on the next frame (falls back to a macrotask) — used to push non-essential
// work (decoration mutation, native round-trips) off the current mousedown/focus
// event so Monaco's own pointer-drag tracking for THIS event finishes first.
const defer = (fn) => (window.requestAnimationFrame || function (f) { setTimeout(f, 0); })(fn);

function updateBlame() { timed('updateBlame', updateBlameNow); }
function updateBlameNow() {
  if (blameDeco) blameDeco.clear();
  const b = blameData[currentPath]; const pos = editor && editor.getPosition();
  if (!b || !pos || !b[pos.lineNumber]) return;
  const model = editor.getModel(); if (!model) return;
  const col = model.getLineMaxColumn(pos.lineNumber);
  blameDeco = editor.createDecorationsCollection([{
    range: new monaco.Range(pos.lineNumber, col, pos.lineNumber, col),
    options: { after: { content: '      ' + b[pos.lineNumber], inlineClassName: 'git-blame-inline', cursorStops: monaco.editor.InjectedTextCursorStops.None }, showIfCollapsed: true }
  }]);
}
// Debounced blame: recreating the inline-blame decoration on EVERY cursor tick is
// wasteful (and forces a re-layout when agent-diff view-zones are present). Coalesce
// so it only runs ~140ms after the cursor settles.
let blameTimer = null;
function scheduleBlame() { clearTimeout(blameTimer); blameTimer = setTimeout(updateBlame, 140); }

// ===== Editor GROUPS (VS Code-style split) =====
// A flex row of groups (#egroups); each group owns an HTML tab strip (.etabs) + a
// Monaco editor (.emonaco). The globals `editor`/`currentPath` ALWAYS point at the
// active group, so every existing helper (LSP / agent-diff / hunknav / blame)
// operates on it unchanged. Native keeps a flat tab list for persistence; the
// WebView owns which group shows which file and renders the tabs.
const groups = [];
let activeIdx = 0;
function activeGroup() { return groups[activeIdx] || groups[0]; }
function reindex() { groups.forEach((g, i) => g.idx = i); }

// ---- layout tree: leaf = a group; split = a row/col of child nodes ----
let layoutRoot = null;
function renderLayout() {
  const host = document.getElementById('egroups');
  while (host.firstChild) host.removeChild(host.firstChild);   // detaches .egroup els (kept alive)
  if (layoutRoot) host.appendChild(renderNode(layoutRoot));
  groups.forEach(g => { try { g.ed.layout(); } catch (e) {} });  // remeasure after reparent
}
function renderNode(node) {
  if (node.type === 'leaf') return node.g.el;
  const box = document.createElement('div'); box.className = 'esplit ' + node.dir;
  for (const c of node.children) box.appendChild(renderNode(c));
  return box;
}
function findParent(node, target) {
  if (!node || node.type === 'leaf') return null;
  for (const c of node.children) { if (c === target) return node; const p = findParent(c, target); if (p) return p; }
  return null;
}
// Insert a new group's leaf beside destLeaf, in the given orientation/side.
function splitLayout(destLeaf, dir, before) {
  const newG = createGroup();
  const parent = findParent(layoutRoot, destLeaf);
  if (parent && parent.dir === dir) {
    const i = parent.children.indexOf(destLeaf);
    parent.children.splice(before ? i : i + 1, 0, newG.node);
  } else {
    const split = { type: 'split', dir, children: before ? [newG.node, destLeaf] : [destLeaf, newG.node] };
    if (!parent) layoutRoot = split;
    else parent.children[parent.children.indexOf(destLeaf)] = split;
  }
  return newG;
}

// ---- tab drag-to-split state ----
let dragPath = null, dragSrc = null;
function zoneOf(el, e) {
  const r = el.getBoundingClientRect();
  const rx = (e.clientX - r.left) / r.width, ry = (e.clientY - r.top) / r.height;
  if (ry > 0.68) return 'bottom';
  if (ry < 0.32) return 'top';
  if (rx > 0.60) return 'right';
  if (rx < 0.40) return 'left';
  return 'center';
}
function showDropIndicator(el, zone) {
  const ind = document.getElementById('dropind');
  const r = el.getBoundingClientRect();
  let top = r.top, left = r.left, w = r.width, h = r.height;
  if (zone === 'right')       { left = r.left + r.width / 2; w = r.width / 2; }
  else if (zone === 'left')   { w = r.width / 2; }
  else if (zone === 'bottom') { top = r.top + r.height / 2; h = r.height / 2; }
  else if (zone === 'top')    { h = r.height / 2; }
  ind.style.display = 'block';
  ind.style.top = top + 'px'; ind.style.left = left + 'px';
  ind.style.width = w + 'px'; ind.style.height = h + 'px';
}
function hideDropIndicator() { document.getElementById('dropind').style.display = 'none'; }
function setDropOverlays(on) { groups.forEach(g => g.dropEl.style.display = on ? 'block' : 'none'); }
function detachFromGroup(g, path) {
  const at = g.tabs.indexOf(path); if (at < 0) return;
  g.tabs.splice(at, 1);
  if (g.active === path) {
    const n = g.tabs[at] || g.tabs[at - 1] || null;
    g.active = n; g.ed.setModel(n ? models[n] : null);
  }
  renderTabs(g);
}
// A tab was dropped on a group. center → move into it; an edge → split that
// direction (top/bottom = stacked, left/right = side-by-side). Native's flat tab
// list is unchanged (the file stays open once) — only group assignment moves.
function handleTabDrop(path, src, dest, zone) {
  const content = models[path] ? models[path].getValue() : '';
  const soloSelf = (src === dest && dest.tabs.length <= 1);   // splitting a 1-tab group off itself is a no-op
  if (zone === 'center' || soloSelf) {
    if (src === dest) { setActiveGroup(dest.idx); if (dest.active !== path) showInGroup(dest, path); dest.ed.focus(); return; }
    detachFromGroup(src, path);
    openInGroup(dest, path, content);
    if (!src.tabs.length && groups.length > 1) removeGroup(src);
    setActiveGroup(groups.indexOf(dest)); dest.ed.focus();
    post({ type: 'activeTab', path });
    return;
  }
  if (groups.length >= 4) { setActiveGroup(dest.idx); return; }
  const dir = (zone === 'bottom' || zone === 'top') ? 'col' : 'row';
  const before = (zone === 'top' || zone === 'left');
  const newG = splitLayout(dest.node, dir, before);
  detachFromGroup(src, path);
  openInGroup(newG, path, content);
  if (!src.tabs.length && groups.length > 1) removeGroup(src);
  renderLayout();
  setActiveGroup(groups.indexOf(newG)); newG.ed.focus();
  post({ type: 'activeTab', path });
}

function createGroup() {
  const el = document.createElement('div'); el.className = 'egroup';
  const tabsEl = document.createElement('div'); tabsEl.className = 'etabs';
  const monEl = document.createElement('div'); monEl.className = 'emonaco';
  const dropEl = document.createElement('div'); dropEl.className = 'edrop';
  el.appendChild(tabsEl); el.appendChild(monEl); el.appendChild(dropEl);
  const ed = monaco.editor.create(monEl, {
    value: '', language: 'plaintext', theme: shikiReady ? currentTheme : 'vs-dark',
    fontFamily: 'Menlo, Monaco, "Courier New", monospace', fontSize: 12,
    minimap: { enabled: true }, automaticLayout: true, scrollBeyondLastLine: false,
    glyphMargin: true, tabSize: 2, renderWhitespace: 'selection',
    inlineSuggest: { enabled: true }, model: null
  });
  const g = { idx: groups.length, el, tabsEl, monEl, dropEl, ed, tabs: [], active: null, node: null, tabEls: {} };
  g.node = { type: 'leaf', g };
  groups.push(g);
  wireEd(g);
  // Bubble phase (not capture) so this runs AFTER Monaco's own mousedown handling
  // for the click has already read the initial hit-test/position — a capture-phase
  // listener here used to fire (and mutate decorations via setActiveGroup) BEFORE
  // Monaco's handler ran, which could corrupt its drag-anchor and start a phantom
  // text selection (issue #5). The idx guard also makes this a true no-op for
  // clicks inside the already-active group.
  el.addEventListener('mousedown', () => { if (activeIdx !== g.idx) setActiveGroup(g.idx); });
  // Drop overlay (above Monaco, only live during a tab drag so Monaco never eats the drop).
  dropEl.addEventListener('dragover', (e) => {
    if (!dragPath) return;
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    g._dropZone = zoneOf(el, e);
    showDropIndicator(el, g._dropZone);
  });
  dropEl.addEventListener('drop', (e) => {
    if (!dragPath) return;
    e.preventDefault();
    const zone = g._dropZone || 'center', sp = dragPath, ss = dragSrc;
    dragPath = null; dragSrc = null; setDropOverlays(false); hideDropIndicator();
    handleTabDrop(sp, ss, g, zone);
  });
  return g;
}

function setActiveGroup(i) {
  if (i < 0 || i >= groups.length) { i = 0; }
  activeIdx = i;
  const g = groups[i]; if (!g) return;
  editor = g.ed;                       // live pointer used by all helpers below
  currentPath = g.active;
  groups.forEach(x => x.el.classList.toggle('focused', x === g));
  // Defer the hunk-nav/blame refresh (blame mutates a Monaco decorations collection)
  // off whatever event triggered this — a mousedown or a focus event fired mid-click.
  // Mutating decorations synchronously inside that event can race Monaco's own
  // mousedown->drag-select tracking and start a phantom selection (issue #5). One
  // rAF tick is imperceptible and runs after Monaco has finished with the event.
  defer(() => { if (activeGroup() === g) { updateHunkNav(currentPath); updateBlame(); } });
}

// Per-editor wiring (was inline for the single editor; now runs for each group).
function wireEd(g) {
  const ed = g.ed;
  // Cross-file go-to-definition: ask native to open a different file.
  try {
    const svc = ed._codeEditorService;
    const base = svc.openCodeEditor.bind(svc);
    svc.openCodeEditor = async (input, sourceEditor, sideBySide) => {
      const res = await base(input, sourceEditor, sideBySide);
      if (!res) {
        const sel = input.options && input.options.selection;
        post({ type: 'openDef', path: input.resource.path,
               line: sel ? sel.startLineNumber : 1, column: sel ? sel.startColumn : 1 });
      }
      return res;
    };
  } catch (e) {}
  ed.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
    if (!g.active) return;
    post({ type: 'save', path: g.active, content: models[g.active].getValue() });
  });
  ed.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Backslash, () => splitEditor('row'));
  ed.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyMod.Alt | monaco.KeyCode.Backslash, () => splitEditor('col'));
  ed.onDidChangeCursorPosition(() => { if (g.idx === activeIdx) scheduleBlame(); });
  // setActiveGroup itself is safe to call synchronously (its decoration/blame work
  // is deferred internally, see setActiveGroup) — but the native round-trip below
  // is NOT: focus fires synchronously as part of Monaco's own mousedown handling
  // (clicking into an unfocused editor focuses it before the click finishes being
  // processed), and `post({type:'focus'})` can make native call back into the
  // WebView (e.g. re-layout on group activation) mid-press. Defer just that hop so
  // Monaco's in-flight drag-select tracking for this mousedown finishes untouched
  // (issue #5).
  ed.onDidFocusEditorText(() => { setActiveGroup(g.idx); defer(() => post({ type: 'focus' })); });
  ed.onDidFocusEditorWidget(() => { setActiveGroup(g.idx); defer(() => post({ type: 'focus' })); });
  ed.onMouseDown(e => {
    if (e.target.type !== monaco.editor.MouseTargetType.GUTTER_GLYPH_MARGIN) return;
    const st = agentState[g.active]; if (!st) return;
    const h = st.lineToHunk[e.target.position.lineNumber]; if (h) revertHunk(g.active, h);
  });
  ed.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyL, () => {
    const sel = ed.getSelection(); const model = ed.getModel();
    if (!model || !sel) return;
    const text = model.getValueInRange(sel); if (!text.trim()) return;
    const name = (g.active || '').split('/').pop() || 'file';
    post({ type: 'sendToAgent', file: name, startLine: sel.startLineNumber, endLine: sel.endLineNumber, text });
  });
}

function tabEl(g, path) {
  const name = path.split('/').pop() || path;
  const t = document.createElement('div');
  t.className = 'etab' + (path === g.active ? ' active' : '') + (isDirty(path) ? ' dirty' : '');
  t.title = path;
  t.setAttribute('draggable', 'true');
  const n = document.createElement('span'); n.className = 'name'; n.textContent = name; t.appendChild(n);
  const dot = document.createElement('span'); dot.className = 'dot'; t.appendChild(dot);
  const x = document.createElement('span'); x.className = 'x'; x.textContent = '✕'; t.appendChild(x);
  t.addEventListener('mousedown', (e) => {
    if (e.target === x) return;
    setActiveGroup(g.idx);
    if (path !== g.active) showInGroup(g, path);
    post({ type: 'activeTab', path });
    g.ed.focus();
  });
  // Drag the tab (header) onto an editor area to split / move — VS Code style.
  t.addEventListener('dragstart', (e) => {
    dragPath = path; dragSrc = g;
    try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/riven-tab', path); } catch (_) {}
    setDropOverlays(true);
  });
  t.addEventListener('dragend', () => { dragPath = null; dragSrc = null; setDropOverlays(false); hideDropIndicator(); });
  x.addEventListener('mousedown', (e) => { e.stopPropagation(); e.preventDefault(); closeInGroup(g, path); });
  return t;
}
function renderTabs(g) {
  g.tabsEl.innerHTML = '';
  g.tabEls = {};
  for (const p of g.tabs) { const el = tabEl(g, p); g.tabEls[p] = el; g.tabsEl.appendChild(el); }
}
// Toggle ONLY the .dirty class on the tab element(s) for `path` — no DOM rebuild.
// This is on the hot path (runs per keystroke via onDidChangeContent), so it must
// stay O(groups showing path), not O(all tabs) like a renderTabs() call would be.
function setTabDirty(path, dirty) {
  for (const g of groups) { const el = g.tabEls && g.tabEls[path]; if (el) el.classList.toggle('dirty', dirty); }
}
// Non-hot-path resync (called after save / reload, where a full recompute is cheap
// and correctness matters more than micro-perf): recompute dirty and sync the class
// + the last-known-state cache used by the hot path in ensureModel().
function refreshDirty(path) {
  const d = isDirty(path);
  lastDirty[path] = d;
  setTabDirty(path, d);
}

const docVersion = {};   // path -> last LSP document version sent
function bumpVersion(path) { docVersion[path] = (docVersion[path] || 1) + 1; return docVersion[path]; }
// Push the model's CURRENT text to the server immediately (before an on-demand

// ---- Agent diff review (riven's MonacoEditorPane) ----
// Given before/after text, compute hunks and render: green added lines, RED deleted
// lines as view-zones above each hunk, a glyph-margin ↩ revert per hunk, and a
// prev/next hunk navigator.
const agentState = {};   // path -> { hunks, after, decoCol, glyphCol, zoneIds, lineToHunk, cur }

// LCS-based line hunks (riven diffLines.computeHunks).
function computeHunks(before, after) {
  const a = before.length ? before.split('\n') : [];
  const b = after.length ? after.split('\n') : [];
  const n = a.length, m = b.length;
  if (n * m > 4000000) {          // too big → single block from prefix/suffix
    let lo = 0; while (lo < n && lo < m && a[lo] === b[lo]) lo++;
    let hiA = n - 1, hiB = m - 1;
    while (hiA >= lo && hiB >= lo && a[hiA] === b[hiB]) { hiA--; hiB--; }
    if (hiA < lo && hiB < lo) return [];
    return [{ beforeStart: lo, beforeCount: hiA - lo + 1, afterStart: lo, afterCount: hiB - lo + 1,
              beforeLines: a.slice(lo, hiA + 1), afterLines: b.slice(lo, hiB + 1) }];
  }
  const dp = []; for (let i = 0; i <= n; i++) dp.push(new Uint32Array(m + 1));
  for (let i = n - 1; i >= 0; i--) for (let j = m - 1; j >= 0; j--)
    dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
  const hunks = []; let i = 0, j = 0;
  while (i < n && j < m) {
    if (a[i] === b[j]) { i++; j++; continue; }
    const bs = i, as = j;
    const bl = [], al = [];
    while (i < n && j < m && a[i] !== b[j]) {
      if (dp[i + 1][j] >= dp[i][j + 1]) { bl.push(a[i]); i++; } else { al.push(b[j]); j++; }
    }
    hunks.push({ beforeStart: bs, beforeCount: bl.length, afterStart: as, afterCount: al.length, beforeLines: bl, afterLines: al });
  }
  if (i < n || j < m) hunks.push({ beforeStart: i, beforeCount: n - i, afterStart: j, afterCount: m - j,
                                   beforeLines: a.slice(i), afterLines: b.slice(j) });
  return hunks.filter(h => h.beforeCount || h.afterCount);
}

function clearAgent(path) {
  const st = agentState[path], m = models[path]; if (!st || !m) return;
  if (st.decoCol) st.decoCol.clear();
  if (st.glyphCol) st.glyphCol.clear();
  if (st.zoneIds && st.zoneIds.length && editor) editor.changeViewZones(acc => st.zoneIds.forEach(id => acc.removeZone(id)));
  delete agentState[path];
}

// Deleted-line view-zones are DOM nodes Monaco must measure on every layout/render.
// A large git-diff (heavy refactor, generated file) can produce hundreds/thousands of
// them, which makes EVERY interaction (cursor move, scroll, typing) re-measure the lot
// — that was the "editor lags only for files opened from the Changes panel" jank. Cap
// the total deleted rows rendered as zones; the green added-line decorations + hunk
// nav + revert glyphs are unaffected, so the review stays fully usable.
const MAX_DEL_ZONE_ROWS = 400;
window.rivenAgentDiff = function (path, before, after) { timed('agentDiff', () => rivenAgentDiffNow(path, before, after)); };
function rivenAgentDiffNow(path, before, after) {
  const m = models[path]; if (!m) return;
  // Decorations render on the ACTIVE editor (`editor`), so focus the group showing
  // this file first.
  const g = groups.find(x => x.active === path) || groups.find(x => x.tabs.includes(path));
  if (g) { if (g.active !== path) showInGroup(g, path); setActiveGroup(g.idx); }
  clearAgent(path);
  const hunks = computeHunks(before, after);
  if (!hunks.length) { updateHunkNav(path); return; }
  const st = { hunks, after, zoneIds: [], lineToHunk: {}, cur: 0 };
  agentState[path] = st;
  const decos = [], glyphs = [];
  for (const h of hunks) {
    if (h.afterCount > 0) {
      const s = h.afterStart + 1, e = h.afterStart + h.afterCount;
      decos.push({ range: new monaco.Range(s, 1, e, 1), options: { isWholeLine: true,
        className: 'agent-add-line', linesDecorationsClassName: 'agent-add-gutter',
        overviewRuler: { color: '#4cc38a', position: monaco.editor.OverviewRulerLane.Left } } });
      st.lineToHunk[s] = h;
      glyphs.push({ range: new monaco.Range(s, 1, s, 1), options: { glyphMarginClassName: 'agent-revert-glyph',
        glyphMarginHoverMessage: { value: T('editor.revertThisChange','이 변경 되돌리기') } } });
    } else {
      // pure deletion — anchor glyph on the line after the deletion point
      const s = Math.max(1, h.afterStart);
      st.lineToHunk[s] = h;
      glyphs.push({ range: new monaco.Range(s, 1, s, 1), options: { glyphMarginClassName: 'agent-revert-glyph',
        glyphMarginHoverMessage: { value: T('editor.revertThisChange','이 변경 되돌리기') } } });
    }
  }
  st.decoCol = editor.createDecorationsCollection(decos);
  st.glyphCol = editor.createDecorationsCollection(glyphs);
  // Red deleted lines as view-zones — budgeted (see MAX_DEL_ZONE_ROWS).
  let rowBudget = MAX_DEL_ZONE_ROWS, truncated = false;
  editor.changeViewZones(acc => {
    for (const h of hunks) {
      if (!h.beforeCount) continue;
      if (rowBudget <= 0) { truncated = true; break; }
      const shown = h.beforeLines.slice(0, rowBudget);
      rowBudget -= shown.length;
      const dom = document.createElement('div'); dom.className = 'agent-del-zone';
      for (const line of shown) {
        const r = document.createElement('div'); r.className = 'agent-del-row'; r.textContent = '− ' + line; dom.appendChild(r);
      }
      if (shown.length < h.beforeLines.length) {
        const r = document.createElement('div'); r.className = 'agent-del-row';
        r.textContent = '  … ' + (h.beforeLines.length - shown.length) + ' more'; dom.appendChild(r);
      }
      st.zoneIds.push(acc.addZone({ afterLineNumber: Math.max(0, h.afterStart), heightInLines: shown.length + 1, domNode: dom }));
    }
  });
  if (truncated) wlog('agentDiff: deleted-line zones capped at ' + MAX_DEL_ZONE_ROWS + ' rows for ' + path);
  updateHunkNav(path);
  // Land the reader on the FIRST change (clicking a file in the Changes panel should
  // jump straight to its first diff, not the top of the file).
  const first = hunks[0];
  const firstLine = first.afterCount > 0 ? first.afterStart + 1 : Math.max(1, first.afterStart);
  editor.setPosition({ lineNumber: firstLine, column: 1 });
  editor.revealLineInCenter(firstLine);
}

function revertHunk(path, h) {
  const st = agentState[path]; if (!st) return;
  const lines = st.after.length ? st.after.split('\n') : [];
  lines.splice(h.afterStart, h.afterCount, ...h.beforeLines);
  post({ type: 'agentRevert', path, newAfter: lines.join('\n') });
}
window.rivenClearAgentDiff = function (path) { clearAgent(path); updateHunkNav(path); };

// glyph-margin click → revert that hunk (wired per-editor in wireEd).

// Prev/next hunk navigator overlay.
function updateHunkNav(path) {
  const nav = document.getElementById('hunknav');
  const st = path === currentPath ? agentState[path] : null;
  if (!st || !st.hunks.length) { nav.style.display = 'none'; return; }
  nav.style.display = 'flex';
  document.getElementById('hunklabel').textContent = `${T('editor.changeWord','변경')} ${st.cur + 1}/${st.hunks.length}`;
}
function gotoHunk(delta) {
  const st = agentState[currentPath]; if (!st || !st.hunks.length) return;
  st.cur = (st.cur + delta + st.hunks.length) % st.hunks.length;
  const h = st.hunks[st.cur]; const line = h.afterCount ? h.afterStart + 1 : Math.max(1, h.afterStart);
  editor.revealLineInCenter(line); editor.setPosition({ lineNumber: line, column: 1 });
  updateHunkNav(currentPath);
}
// Revert the current hunk (restore before-lines to disk).
function revertCurrentHunk() {
  const st = agentState[currentPath]; if (!st || !st.hunks.length) return;
  revertHunk(currentPath, st.hunks[st.cur]);
}
// Accept the current hunk: just drop it from the review (disk unchanged).
function acceptCurrentHunk() {
  const st = agentState[currentPath]; if (!st || !st.hunks.length) return;
  st.hunks.splice(st.cur, 1);
  if (st.cur >= st.hunks.length) st.cur = Math.max(0, st.hunks.length - 1);
  const before = st.after; // recompute decorations from remaining hunks
  // rebuild decorations/zones for the remaining hunks
  const remaining = st.hunks;
  window.rivenAgentDiff(currentPath, computeBeforeFrom(remaining, st.after), st.after);
}
// Reconstruct a "before" text that yields only the remaining hunks (apply reverts of
// the accepted ones is not needed — simplest: keep after as before for accepted).
function computeBeforeFrom(hunks, after) {
  const lines = after.length ? after.split('\n') : [];
  // Build before by replacing each remaining hunk's after-range with its before-lines.
  const out = lines.slice();
  for (let i = hunks.length - 1; i >= 0; i--) {
    const h = hunks[i];
    out.splice(h.afterStart, h.afterCount, ...h.beforeLines);
  }
  return out.join('\n');
}
// Inline git blame: native sends a { line: "author, time · summary" } map.
window.rivenSetBlame = function (path, map) {
  blameData[path] = map;
  if (path === currentPath) updateBlame();
};
</script>
