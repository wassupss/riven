appId: dev.riven.app
productName: riven
copyright: Copyright © 2026 riven
# Update feed: electron-builder writes latest-mac.yml pointing at GitHub
# Releases; electron-updater (main process) reads it to auto-update.
publish:
  provider: github
  owner: wassupss
  repo: riven
directories:
  buildResources: build
  output: release
files:
  - out/**
  - package.json
# These packages are spawned as real child processes (node-pty's spawn-helper,
# the language servers run via Electron-as-Node against a real file path), so
# they must live on disk outside the asar archive.
asarUnpack:
  - node_modules/node-pty/**
  - node_modules/typescript-language-server/**
  - node_modules/typescript/**
  - node_modules/pyright/**
  - node_modules/yaml-language-server/**
  - node_modules/bash-language-server/**
mac:
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # Signed + notarized distribution. The "Developer ID Application" cert is
  # auto-detected from the login keychain. Notarization credentials are read
  # from environment variables at build time (never commit them):
  #   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  # (or the App Store Connect API key trio: APPLE_API_KEY / _KEY_ID / _ISSUER)
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
dmg:
  title: ${productName}
win:
  target: nsis
  icon: build/icon.png
linux:
  target: AppImage
  category: Development
  icon: build/icon.png
